<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="tail.css">
</head>

<body>
    <div class="h-screen w-full flex justify-center flex-col bg-black ">
        <!-- <h1 class="text center text-white text-4xl font-bold font-mono text-center mt-20 ">CALCULATOR</h1> -->
        <div class="rounded-xl border min-h-80 bg-white  w-96 p-2 m-auto">
            <h1 class="text center text-3xl font-medium  p-4 text-center mt-2 text-black ">CALCULATOR</h1>

            <section class=" flex justify-center flex-col text-center">
                <p class="text-xl font-mono m-1 ">INPUT1 <input type="text" id="input1"
                        class="p-0.5 my-2 border-1 border-gray-500 rounded-xl"></p>
                <p class="text-xl font-mono m-1 ">INPUT2 <input type="text" id="input2"
                        class="p-0.5 my-2 border-1 border-gray-500 rounded-xl"></p>
                <div class="flex justify-between  w-full ">
                    <button
                        class="rounded-xl w-full h-full p-3 m-3 font-bold bg-black text-white  shadow hover:shadow-cyan-900 hover:scale-105 duration-200 transition-all"
                        onclick="add()">ADD</button>
                    <button
                        class="rounded-xl w-full h-full p-3 m-3 font-bold bg-black text-white shadow hover:shadow-cyan-900 hover:scale-105 duration-200 transition-all "
                        onclick="sub()">SUBSTRACT</button>
                </div>
                <div class="flex justify-between   w-full ">
                    <button
                        class="rounded-xl w-full h-full p-3  m-3 font-bold bg-black text-white shadow hover:shadow-cyan-900 hover:scale-105 duration-200 transition-all"
                        onclick="multiply()">MULTIPLY</button>
                    <button
                        class="rounded-xl w-full h-full p-3  m-3 font-bold bg-black text-white shadow hover:shadow-cyan-900 hover:scale-105 duration-200 transition-all "
                        onclick="division()">DIVIDE</button>
                </div>
                <p class=" mt-8 text-xl font-bold font-mono" id="para">
                    <span id="ans"></span>
                </p>
            </section>
        </div>
    </div>

    <script>
        function add() {
            var input1 = parseInt(document.getElementById("input1").value);
            var input2 = parseInt(document.getElementById("input2").value);
            // var ans = document.getElementById("ans");
            var para = document.getElementById("para")
            sum = input1 + input2;
            para.innerHTML = "YOUR ANSWER IS " + sum;
            // ans.innerHTML = sum;
            return;
        }
        function sub() {
            var input1 = parseInt(document.getElementById("input1").value);
            var input2 = parseInt(document.getElementById("input2").value);
            var para = document.getElementById("para")
            sub = input1 - input2;
            para.innerHTML = "YOUR ANSWER IS " + sub;
            return;
        }
        function multiply() {
            var input1 = parseInt(document.getElementById("input1").value);
            var input2 = parseInt(document.getElementById("input2").value);
            var para = document.getElementById("para")
            multiply = input1 * input2;
            para.innerHTML = "YOUR ANSWER IS " + multiply;
            return;
        } function division() {
            var input1 = parseInt(document.getElementById("input1").value);
            var input2 = parseInt(document.getElementById("input2").value);
            var para = document.getElementById("para")
            div = input1 / input2;
            para.innerHTML = "YOUR ANSWER IS " + div;
            return;
        }
    </script>
</body>

</html>
