<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="tail.css">
</head>
<body>

    <div class=" w-full  h-screen  justify-center items-center flex flex-col bg-[url(bg.jpeg)]  bg-cover  ">

        <div class=" flex flex-col text-white mx-auto p-5 rounded-xl shadow shadow-gray-200">
        <h1 class="text-3xl mx-auto my-8" >Save Name </h1>

    <input class=" border border-white  text-xl shadow shadow-slate-800 p-2 rounded-xl w-70" type="text" placeholder="Enter your name " id="uname">
    <button class="p-2 my-6 shadow shadow-gray-500 bg-blue-500 rounded-xl  w-40 mx-auto text-xl hover:bg-blue-600 transition-all duration-700 hover:scale-105 border border-gray-600" onclick="savedata()">save</button>
    <h1 class="text-2xl py-1  mx-auto text-gray-600"> <span id="name"></span></h1>
</div>
</div>

    <script>
        function savedata(){
            var uname=document.getElementById("uname").value;
    localStorage.setItem("username" ,uname)
        }

        var data=document.getElementById("name");
        
        data.innerHTML=localStorage.getItem("username")
    </script>
</body>
</html>
