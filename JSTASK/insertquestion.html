<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>insertquestions</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="tail.css">
    <script src="q.js"></script>


</head>

<body class="bg-black text-white w-full h-screen">
    <div
        class="border p-4 m-auto w-fit mt-5 rounded-xm border-gray-900 items-center shadow hover:shadow-cyan-100 transition-all duration-1000">
        <h1 class="text-xl mb-2 mr-40 text-center"> Add Questions Here </h1>
        <div class="flex flex-col items-center m-auto w-fit border rounded-xm border-gray-900 px-2 ">

            <textarea class="border border-gray-700 mt-4 w-96 p-1  rounded-xm my-5" placeholder="write question here"
                id="que"></textarea>
            <input class="border  border-gray-700  m-2.5 p-1.5 rounded-xl  w-96 " type="text" id="op1"
                placeholder="option1">
            <input class="border  border-gray-700  m-2.5 p-1.5 rounded-xl  w-96 " type="text" id="op2"
                placeholder="option2">
            <input class="border  border-gray-700  m-2.5 p-1.5 rounded-xl  w-96 " type="text" id="op3"
                placeholder="option3">
            <input class="border  border-gray-700  m-2.5 p-1.5 rounded-xl  w-96" type="text" id="op4"
                placeholder="option4">
            <input class="border border-gray-700  m-2.5 p-1.5 rounded-xl   w-96" type="text" id="ans"
                placeholder="answer">

            <button
                class="text-center my-6  text-xl w-44 border p-2 rounded-2xl border-gray-600 shadow hover:shadow-amber-200 transition-all duration-200"
                onclick="saveQue()">Save</button>
            <button
                class="text-center  mb-6 text-xl w-44 border p-2 rounded-2xl border-gray-600 shadow hover:shadow-amber-200 transition-all duration-200"
                onclick="showQuestions()">Show questions</button>
        </div>
    </div>
    <div id="show"></div>
</body>

</html>
